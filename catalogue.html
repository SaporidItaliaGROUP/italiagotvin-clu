<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue — Italian's Got Vin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:   #0e0d0b;
  --gold:  #C9A84C;
  --gold2: #E8D5A0;
  --red:   #C8151B;
  --cream: #F7F3EC;
  --warm:  #EDE7DA;
  --mid:   #8C7B66;
  --light: #FAF8F4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--ink); }

nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 64px;
  background: rgba(14,13,11,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.2);
}
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold); text-decoration: none; }
.nav-logo span { font-style: italic; color: #fff; }
.nav-back { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; text-decoration: none; transition: color 0.2s; }
.nav-back:hover { color: var(--gold); }
#cart-btn {
  background: var(--red); color: #fff; border: none;
  padding: 9px 20px; font-size: 0.75rem; letter-spacing: 0.1em;
  text-transform: uppercase; cursor: pointer; font-family: 'Inter', sans-serif;
}

.catalogue-header {
  background: var(--ink); padding: 48px 48px 40px;
  border-bottom: 1px solid rgba(201,168,76,0.15);
}
.catalogue-header h1 {
  font-family: 'Cormorant Garamond', serif; font-size: 2.2rem;
  font-weight: 300; color: #fff;
}
.catalogue-header h1 em { font-style: italic; color: var(--gold); }
.catalogue-header p { font-size: 0.82rem; color: #777; margin-top: 6px; }

#filters {
  background: #fff; padding: 16px 48px;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  border-bottom: 1px solid #e8e2d8; position: sticky; top: 64px; z-index: 50;
}
#filters label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); font-weight: 500; }
#filters select, #filters input {
  padding: 8px 14px; border: 1px solid #ddd; font-size: 0.85rem;
  background: var(--light); color: var(--ink); font-family: 'Inter', sans-serif;
  outline: none;
}
#filters select:focus, #filters input:focus { border-color: var(--red); }
#result-count { margin-left: auto; font-size: 0.75rem; color: var(--mid); }

#wine-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 1px; padding: 0; background: #e8e2d8;
}
.wine-card {
  background: var(--light); display: flex; flex-direction: column;
  transition: background 0.15s;
}
.wine-card:hover { background: #fff; }
.wine-card img {
  width: 100%; height: 220px; object-fit: contain;
  background: var(--cream); padding: 16px; cursor: pointer;
}
.wine-img-placeholder {
  width: 100%; height: 220px; background: var(--cream);
  display: flex; align-items: center; justify-content: center; font-size: 3rem;
}
.card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; border-top: 1px solid #e8e2d8; }
.card-producer { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--red); font-weight: 500; }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; margin: 6px 0 4px; line-height: 1.3; flex: 1; color: var(--ink); }
.card-type { font-size: 0.7rem; color: var(--mid); margin-bottom: 12px; }
.card-price { font-size: 1.05rem; font-weight: 500; color: var(--ink); margin-bottom: 12px; }
.add-btn {
  background: var(--ink); color: #fff; border: none; padding: 9px;
  font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; width: 100%; font-family: 'Inter', sans-serif; transition: background 0.2s;
}
.add-btn:hover { background: var(--red); }

#no-results { text-align: center; padding: 80px; color: var(--mid); font-size: 1rem; display: none; }

/* CART */
#cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; }
#cart-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 400px;
  background: var(--ink); border-left: 1px solid rgba(201,168,76,0.2);
  display: flex; flex-direction: column; z-index: 201;
  transform: translateX(100%); transition: transform 0.3s;
}
#cart-panel.open { transform: translateX(0); }
#cart-header { padding: 20px 24px; border-bottom: 1px solid rgba(201,168,76,0.15); display: flex; justify-content: space-between; align-items: center; }
#cart-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold); }
#cart-close { background: none; border: none; color: #aaa; font-size: 1.4rem; cursor: pointer; }
#cart-items { flex: 1; overflow-y: auto; padding: 20px 24px; }
.cart-item { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.cart-item-name { flex: 1; font-size: 0.82rem; color: #ddd; line-height: 1.4; }
.cart-item-price { font-size: 0.82rem; color: var(--gold); white-space: nowrap; }
.qty-controls { display: flex; align-items: center; gap: 8px; }
.qty-btn { background: #222; border: 1px solid #333; color: #fff; width: 26px; height: 26px; cursor: pointer; }
.qty-btn:hover { background: var(--red); border-color: var(--red); }
#cart-footer { padding: 20px 24px; border-top: 1px solid rgba(201,168,76,0.15); }
#cart-total { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: #fff; margin-bottom: 16px; }
#order-name, #order-phone {
  width: 100%; padding: 10px 14px; background: #1a1916; border: 1px solid #333;
  color: #fff; font-family: 'Inter', sans-serif; font-size: 0.85rem; margin-bottom: 10px;
}
#send-wa {
  background: #25D366; color: #fff; border: none; padding: 13px;
  width: 100%; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; font-family: 'Inter', sans-serif;
}
#send-wa:hover { background: #1da851; }

/* LIGHTBOX */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; }
#lightbox-close { position: absolute; top: 20px; right: 28px; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none; }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .catalogue-header { padding: 32px 20px 28px; }
  #filters { padding: 12px 20px; top: 64px; }
  #cart-panel { width: 100%; }
}
</style>
</head>

<nav>
  <a class="nav-logo" href="index.html">Italian's <span>Got Vin</span></a>

<div class="catalogue-header">

<div id="wine-grid"></div>

<div id="cart-panel">

    <button id="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cart-items"></div>

</div>

let cart = {};

const producers = [...new Set(WINES.map(w => w.fornitore))].sort();
const types = [...new Set(WINES.map(w => w.tipologia))].sort();
const selP = document.getElementById('filter-producer');
const selT = document.getElementById('filter-type');
producers.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; selP.appendChild(o); });
types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; selT.appendChild(o); });

// Apply filter: URL param + sessionStorage, after options are populated
(function() {
  const urlParams = new URLSearchParams(location.search);
  const urlType = urlParams.get('type'); // URLSearchParams auto-decodes + as space
  const savedType = sessionStorage.getItem('igv_filter_type');
  const want = urlType || savedType || '';
  if (want) {
    const opts = [...selT.options].map(o => o.value);
    const exact = opts.find(v => v === want);
    const partial = opts.find(v => v.toLowerCase().startsWith(want.toLowerCase()));
    selT.value = exact || partial || '';
  }
  if (savedType) sessionStorage.removeItem('igv_filter_type');
})();

function fmt(n) { return n.toLocaleString('fr-FR') + ' FCFA'; }

function renderGrid() {
  const fp = selP.value, ft = selT.value;
  const fs = document.getElementById('filter-search').value.toLowerCase();
  const filtered = WINES.filter(w =>
    (!fp || w.fornitore === fp) &&
    (!ft || w.tipologia === ft) &&
    (!fs || w.nome.toLowerCase().includes(fs) || w.tipologia.toLowerCase().includes(fs))
  );
  const grid = document.getElementById('wine-grid');
  const noRes = document.getElementById('no-results');
  document.getElementById('result-count').textContent = filtered.length + ' résultat' + (filtered.length !== 1 ? 's' : '');
  if (filtered.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  grid.innerHTML = filtered.map(w => {
    const shortName = w.nome.replace(/^[A-Z &]+ - /, '');
    const imgHtml = w.immagine
      ? `<img src="images/${w.immagine}" alt="${w.nome}" loading="lazy" onclick="openLightbox('images/${w.immagine}')" onerror="this.parentElement.innerHTML='<div class=wine-img-placeholder>🍷</div>'">`
      : `<div class="wine-img-placeholder">🍷</div>`;
    return `<div class="wine-card">
      ${imgHtml}
      <div class="card-body">
        <div class="card-producer">${w.fornitore}</div>
        <div class="card-name">${shortName}</div>
        <div class="card-type">${w.tipologia}</div>
        <div class="card-price">${fmt(w.prezzoDettaglio)}</div>
        <button class="add-btn" onclick="addToCart('${w.ean}')">+ Ajouter au panier</button>
      </div>
    </div>`;
  }).join('');
}

function addToCart(ean) { cart[ean] = (cart[ean] || 0) + 1; updateCartCount(); }
function updateCartCount() {
  document.getElementById('cart-count').textContent = '(' + Object.values(cart).reduce((a,b)=>a+b,0) + ')';
}
function openCart() {
  document.getElementById('cart-overlay').style.display = 'block';
  document.getElementById('cart-panel').classList.add('open');
  renderCart();
}
function closeCart() {
  document.getElementById('cart-overlay').style.display = 'none';
  document.getElementById('cart-panel').classList.remove('open');
}
function renderCart() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  const container = document.getElementById('cart-items');
  if (keys.length === 0) {
    container.innerHTML = '<p style="color:#555;text-align:center;padding:40px">Votre panier est vide</p>';
    document.getElementById('cart-total').innerHTML = 'Total : <strong>0 FCFA</strong>';
    return;
  }
  let total = 0;
  container.innerHTML = keys.map(ean => {
    const w = WINES.find(x => x.ean === ean);
    const sub = w.prezzoDettaglio * cart[ean];
    total += sub;
    const shortName = w.nome.replace(/^[A-Z &]+ - /, '');
    return `<div class="cart-item">
      <div class="cart-item-name">${shortName}</div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty('${ean}',-1)">−</button>
        <span style="color:#fff;min-width:20px;text-align:center">${cart[ean]}</span>
        <button class="qty-btn" onclick="changeQty('${ean}',1)">+</button>
      </div>
      <div class="cart-item-price">${fmt(sub)}</div>
    </div>`;
  }).join('');
  document.getElementById('cart-total').innerHTML = `Total : <strong>${fmt(total)}</strong>`;
}
function changeQty(ean, delta) {
  cart[ean] = (cart[ean] || 0) + delta;
  if (cart[ean] <= 0) delete cart[ean];
  updateCartCount(); renderCart();
}
function sendWhatsApp() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  if (keys.length === 0) { alert('Votre panier est vide.'); return; }
  const name = document.getElementById('order-name').value.trim();
  const phone = document.getElementById('order-phone').value.trim();
  let total = 0;
  const lines = keys.map(ean => {
    const w = WINES.find(x => x.ean === ean);
    total += w.prezzoDettaglio * cart[ean];
    return `• ${cart[ean]}x ${w.nome.replace(/^[A-Z &]+ - /,'')} — ${fmt(w.prezzoDettaglio * cart[ean])}`;
  }).join('\n');
  let msg = `🍷 *Commande Italian's Got Vin*\n`;
  if (name) msg += `👤 ${name}\n`;
  if (phone) msg += `📞 ${phone}\n`;
  msg += `\n${lines}\n\n💰 *Total : ${fmt(total)}*\n\n_Sapori d'Italia — Dakar_`;
  window.open(`https://wa.me/221762566776?text=${encodeURIComponent(msg)}`, '_blank');
}
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

renderGrid();
</script>
